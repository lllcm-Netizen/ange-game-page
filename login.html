<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安吉游戏传感器数据系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .login-card { max-width: 420px; margin: 80px auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card-header { background: #0d6efd; color: #fff; border-radius: 12px 12px 0 0 !important; }
        .role-group { gap: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card">
            <div class="card-header text-center py-3">
                <h5 class="mb-0">安吉游戏传感器数据系统</h5>
            </div>
            <div class="card-body p-4">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">账号</label>
                        <input type="text" id="username" class="form-control" placeholder="请输入账号" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
                    </div>
                    <div class="mb-3 role-group d-flex">
                        <div class="form-check flex-grow-1">
                            <input class="form-check-input" type="radio" name="role" id="roleAdmin" value="admin" checked>
                            <label class="form-check-label" for="roleAdmin">管理员</label>
                        </div>
                        <div class="form-check flex-grow-1">
                            <input class="form-check-input" type="radio" name="role" id="roleGuest" value="guest">
                            <label class="form-check-label" for="roleGuest">游客</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">登录</button>
                </form>
                <div class="mt-3 text-muted small text-center">
                    默认账号：<br>
                    管理员：admin / 123456<br>
                    游客：guest / 123456
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.querySelector('input[name="role"]:checked').value;

            // 前端简单校验（仅界面用，无真实验证）
            if ((username === 'admin' && password === '123456' && role === 'admin') ||
                (username === 'guest' && password === '123456' && role === 'guest')) {
                // 把角色存到本地存储，用于展示页权限控制
                localStorage.setItem('userRole', role);
                localStorage.setItem('username', username);
                window.location.href = 'index.html';
            } else {
                alert('账号或密码或角色不匹配');
            }
        });
    </script>
</body>
</html>
